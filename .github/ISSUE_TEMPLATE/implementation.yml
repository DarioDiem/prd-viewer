name: PRD implementation task
description: Create one assignable implementation slice linked to a PRD work item.
title: "[PTW-###] "
body:
  - type: input
    id: ptw
    attributes:
      label: Parent work item
      description: Existing PTW identifier from the canonical PRD.
      placeholder: PTW-001
    validations:
      required: true
  - type: input
    id: design
    attributes:
      label: Design reference
      description: TRD identifier and section, or "Not required" for a trivial change.
      placeholder: TRD-001 — Interfaces and data ownership
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: One independently assignable and reviewable result.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Observable conditions that must be true before this issue closes.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Tests, commands, reviews, or artifacts that prove completion.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and blockers
      description: Link blocking issues or write "None".
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Delivery size
      options:
        - Small — up to one focused day
        - Medium — up to three focused days
        - Large — split before implementation
    validations:
      required: true
